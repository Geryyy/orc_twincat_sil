name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint: pre-commit (clang-format, black, ruff, etc., whatever is configured)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        if: hashFiles('.pre-commit-config.yaml') != ''
        run: python -m pip install pre-commit

      - name: Run pre-commit
        if: hashFiles('.pre-commit-config.yaml') != ''
        run: pre-commit run --all-files --show-diff-on-failure

      - name: No pre-commit config, skipping
        if: hashFiles('.pre-commit-config.yaml') == ''
        run: echo "No .pre-commit-config.yaml at repo root; skipping pre-commit."

  # ---------------------------------------------------------------------------
  # FlatBuffers wire-format consistency
  #
  # The generated header at include/orc/com/flatbuffers/orc_messages_generated.h
  # is checked into git so PC and TwinCAT-RT agree on the wire format at the
  # same git commit. This job re-runs flatc 1.12 against proto/orc_messages.fbs
  # and fails if the regenerated header doesn't match the committed copy. That
  # closes the "edited the .fbs but forgot to regen" footgun before merge.
  # ---------------------------------------------------------------------------
  flatbuffers-consistency:
    name: FlatBuffers schema/header consistency
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache flatc build
        id: cache-flatc
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/flatc
          key: flatc-1.12.0-${{ runner.os }}-${{ runner.arch }}

      - name: Build flatc from submodule
        if: steps.cache-flatc.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cmake -S third_party/flatbuffers -B /tmp/fb-build \
            -DFLATBUFFERS_BUILD_TESTS=OFF \
            -DFLATBUFFERS_BUILD_FLATC=ON \
            -DFLATBUFFERS_BUILD_FLATHASH=OFF \
            -DCMAKE_CXX_STANDARD=17
          cmake --build /tmp/fb-build --target flatc -j"$(nproc)"
          sudo install /tmp/fb-build/flatc /usr/local/bin/flatc

      - name: Regenerate header into a temp dir
        run: |
          set -euo pipefail
          mkdir -p /tmp/regen
          /usr/local/bin/flatc \
            --cpp \
            --gen-mutable \
            --gen-object-api \
            --scoped-enums \
            -o /tmp/regen \
            proto/orc_messages.fbs

      - name: Diff against committed header
        run: |
          set -euo pipefail
          # Ignore the include lines for flatbuffers.h and import_flatbuffers.h since those are not generated by flatc and can be manually edited in the committed header to work around include path issues on different platforms.
          # Also ignore formatting-only churn (whitespace / blank lines / line-ending differences).
          if ! diff -u \
              <(grep -v '#include "flatbuffers/flatbuffers.h"' \
              | grep -v '#include "orc/util/import_flatbuffers.h"' include/orc/com/flatbuffers/orc_messages_generated.h) \
              <(grep -v '#include "flatbuffers/flatbuffers.h"' /tmp/regen/orc_messages_generated.h); then
            echo ""
            echo "::error::orc_messages_generated.h is out of sync with proto/orc_messages.fbs."
            echo "::error::Regenerate locally:"
            echo "::error::  flatc --cpp --gen-mutable --gen-object-api --scoped-enums \\"
            echo "::error::      -o include/orc/com/flatbuffers proto/orc_messages.fbs"
            echo "::error::and commit the result. PC and TwinCAT must consume the same header."
            exit 1
          fi
          echo "Generated header matches the committed copy."

  # ---------------------------------------------------------------------------
  # Build + test matrix
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            ninja-build \
            libboost-all-dev \
            libgtest-dev \
            libeigen3-dev \
            clang

      - name: Cache MuJoCo install tree
        id: cache-mujoco
        uses: actions/cache@v5
        with:
          path: /usr/local/mujoco-3.3.2
          key: mujoco-3.3.2-${{ runner.os }}-${{ runner.arch }}

      - name: Install MuJoCo
        if: steps.cache-mujoco.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/deepmind/mujoco.git
          cd mujoco && git checkout tags/3.3.2
          cmake -S . -B build -DMUJOCO_BUILD_EXAMPLES=OFF -DMUJOCO_BUILD_SIMULATE=OFF -DMUJOCO_BUILD_TESTS=OFF -DBUILD_TESTING=OFF
          sudo cmake --build build --target install -- -j$(nproc)

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UBSan
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxinerama-dev libxcursor-dev libxrandr-dev libxi-dev \
            ninja-build libboost-all-dev libgtest-dev libeigen3-dev clang

      - name: Install MuJoCo
        run: |
          git clone https://github.com/deepmind/mujoco.git
          cd mujoco && git checkout tags/3.3.2
          cmake -S . -B build -DMUJOCO_BUILD_EXAMPLES=OFF -DMUJOCO_BUILD_SIMULATE=OFF -DMUJOCO_BUILD_TESTS=OFF -DBUILD_TESTING=OFF
          sudo cmake --build build --target install -- -j$(nproc)

      - name: Configure (ASan + UBSan)
        env:
          CC: clang
          CXX: clang++
          CFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          CXXFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          LDFLAGS: "-fsanitize=address,undefined"
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test under sanitizers
        working-directory: build
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=0:abort_on_error=0:print_summary=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=0"
        run: ctest --output-on-failure

  # ---------------------------------------------------------------------------
  # clang-tidy on changed .cpp/.h files (PR) or full repo (push)
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxinerama-dev libxcursor-dev libxrandr-dev libxi-dev \
            ninja-build libboost-all-dev libgtest-dev libeigen3-dev \
            clang-tidy clang

      - name: Install MuJoCo
        run: |
          git clone https://github.com/deepmind/mujoco.git
          cd mujoco && git checkout tags/3.3.2
          cmake -S . -B build -DMUJOCO_BUILD_EXAMPLES=OFF -DMUJOCO_BUILD_SIMULATE=OFF -DMUJOCO_BUILD_TESTS=OFF -DBUILD_TESTING=OFF
          sudo cmake --build build --target install -- -j$(nproc)

      - name: Configure (export compile_commands.json)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build -S . \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON

      - name: Determine changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git fetch --no-tags --depth=50 origin "$BASE" || true
            FILES=$(git diff --name-only --diff-filter=AMR "$BASE" "$HEAD" \
              -- '*.cpp' '*.cc' '*.cxx' '*.h' '*.hpp' | tr '\n' ' ')
          else
            FILES=$(git ls-files '*.cpp' '*.cc' '*.cxx' '*.h' '*.hpp' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: Run clang-tidy
        if: steps.changed.outputs.files != ''
        run: |
          # Fall back to run-clang-tidy for multi-file parallel execution.
          if command -v run-clang-tidy >/dev/null 2>&1; then
            run-clang-tidy -p build -quiet ${{ steps.changed.outputs.files }}
          else
            for f in ${{ steps.changed.outputs.files }}; do
              clang-tidy -p build "$f" || true
            done
          fi

  # ---------------------------------------------------------------------------
  # Coverage (gcov + gcovr -> Codecov via OIDC)
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxinerama-dev libxcursor-dev libxrandr-dev libxi-dev \
            ninja-build libboost-all-dev libgtest-dev libeigen3-dev \
            gcovr lcov

      - name: Install MuJoCo
        run: |
          git clone https://github.com/deepmind/mujoco.git
          cd mujoco && git checkout tags/3.3.2
          cmake -S . -B build -DMUJOCO_BUILD_EXAMPLES=OFF -DMUJOCO_BUILD_SIMULATE=OFF -DMUJOCO_BUILD_TESTS=OFF -DBUILD_TESTING=OFF
          sudo cmake --build build --target install -- -j$(nproc)

      - name: Configure (coverage)
        env:
          CC: gcc
          CXX: g++
          CFLAGS: "--coverage -O0 -g"
          CXXFLAGS: "--coverage -O0 -g"
          LDFLAGS: "--coverage"
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Generate coverage report
        run: |
          gcovr --root . \
            --exclude 'build/.*' \
            --exclude '.*/tests/.*' \
            --exclude '.*/external/.*' \
            --xml -o coverage.xml \
            --xml-pretty

      - name: Upload to Codecov (OIDC, tokenless)
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          use_oidc: true
